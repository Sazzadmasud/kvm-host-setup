---
# VIPs are bound by the libvirt network hook (roles/vip) — not managed here.
# HAProxy binds to the specific VIPs in haproxy.cfg.j2 so it starts
# after libvirtd to ensure virbr4 and the VIPs already exist.

- name: Create systemd override dir for haproxy
  ansible.builtin.file:
    path: /etc/systemd/system/haproxy.service.d
    state: directory
    mode: "0755"

- name: Override haproxy.service — start after libvirtd, auto-restart
  ansible.builtin.copy:
    dest: /etc/systemd/system/haproxy.service.d/after-libvirt.conf
    content: |
      [Unit]
      After=libvirtd.service

      [Service]
      Restart=on-failure
      RestartSec=5
    mode: "0644"
  notify:
    - systemd daemon-reload
    - restart haproxy

- name: Deploy HAProxy config from template
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: "0644"
  notify: restart haproxy

- name: Allow HAProxy ports in libvirt firewalld zone
  ansible.posix.firewalld:
    zone: libvirt
    port: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - 6443/tcp
    - 22623/tcp
    - 80/tcp
    - 443/tcp

- name: Enable haproxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    daemon_reload: true

---
# ──────────────────────────────────────────────
#  1. Destroy and undefine all VMs
# ──────────────────────────────────────────────
- name: Get list of all defined VMs
  ansible.builtin.command: virsh list --all --name
  register: all_vms
  changed_when: false

- name: Destroy running VMs
  ansible.builtin.command: "virsh destroy {{ item }}"
  loop: "{{ all_vms.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

- name: Undefine VMs (remove NVRAM/firmware state)
  ansible.builtin.command: "virsh undefine {{ item }} --nvram --remove-all-storage"
  loop: "{{ all_vms.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

# ──────────────────────────────────────────────
#  2. Destroy and undefine all non-default networks
# ──────────────────────────────────────────────
- name: Get list of all defined networks
  ansible.builtin.command: virsh net-list --all --name
  register: all_networks
  changed_when: false

- name: Destroy active networks
  ansible.builtin.command: "virsh net-destroy {{ item }}"
  loop: "{{ all_networks.stdout_lines | select('ne', '') | reject('eq', 'default') | list }}"
  ignore_errors: true
  changed_when: true

- name: Undefine networks
  ansible.builtin.command: "virsh net-undefine {{ item }}"
  loop: "{{ all_networks.stdout_lines | select('ne', '') | reject('eq', 'default') | list }}"
  ignore_errors: true
  changed_when: true

# ──────────────────────────────────────────────
#  3. Destroy and undefine all storage pools
# ──────────────────────────────────────────────
- name: Get list of all storage pools
  ansible.builtin.command: virsh pool-list --all --name
  register: all_pools
  changed_when: false

- name: Destroy active pools
  ansible.builtin.command: "virsh pool-destroy {{ item }}"
  loop: "{{ all_pools.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

- name: Undefine storage pools
  ansible.builtin.command: "virsh pool-undefine {{ item }}"
  loop: "{{ all_pools.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

# ──────────────────────────────────────────────
#  4. Kill stale dnsmasq processes not tracked by virtnetworkd
#     These are left behind when networks were created by the old
#     monolithic libvirtd and the modular daemons don't see them.
# ──────────────────────────────────────────────
- name: Find stale libvirt dnsmasq PID files
  ansible.builtin.find:
    paths: /var/run/libvirt/network
    patterns: "*.pid"
  register: stale_pid_files
  ignore_errors: true

- name: Kill stale dnsmasq processes from PID files
  ansible.builtin.shell: |
    pid=$(cat {{ item.path }} 2>/dev/null)
    [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
  loop: "{{ stale_pid_files.files | default([]) }}"
  ignore_errors: true
  changed_when: true

- name: Remove all stale libvirt network runtime state
  ansible.builtin.file:
    path: /var/run/libvirt/network
    state: absent
  ignore_errors: true

- name: Recreate empty libvirt network runtime dir
  ansible.builtin.file:
    path: /var/run/libvirt/network
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Remove stale dnsmasq virbr status files
  ansible.builtin.shell: "rm -f /var/lib/libvirt/dnsmasq/virbr*.status"
  ignore_errors: true
  changed_when: true

# ──────────────────────────────────────────────
#  5. Remove stale vnet and virbr interfaces
# ──────────────────────────────────────────────
- name: Find stale vnet interfaces
  ansible.builtin.shell: "ip link show | grep -oP 'vnet[0-9]+' || true"
  register: vnet_ifaces
  changed_when: false

- name: Delete stale vnet interfaces
  ansible.builtin.command: "ip link delete {{ item }}"
  loop: "{{ vnet_ifaces.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

- name: Find stale virbr interfaces
  ansible.builtin.shell: "ip link show | grep -oP 'virbr[0-9]+(?=:)' || true"
  register: virbr_ifaces
  changed_when: false

- name: Delete stale virbr interfaces
  ansible.builtin.command: "ip link delete {{ item }}"
  loop: "{{ virbr_ifaces.stdout_lines | select('ne', '') | list }}"
  ignore_errors: true
  changed_when: true

# ──────────────────────────────────────────────
#  6. Wipe OCP/image directories on /opt
# ──────────────────────────────────────────────
- name: Remove OCP and image directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ cleanup_dirs }}"

- name: Recreate empty directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ cleanup_dirs }}"

# ──────────────────────────────────────────────
#  7. Free root filesystem space
# ──────────────────────────────────────────────
- name: Clean dnf package cache
  ansible.builtin.command: dnf clean all
  changed_when: true

- name: Vacuum systemd journal to 200MB
  ansible.builtin.command: journalctl --vacuum-size=200M
  changed_when: true

- name: Remove unused Docker images, containers, and volumes
  ansible.builtin.command: docker system prune -af --volumes
  ignore_errors: true
  changed_when: true

- name: Report root filesystem usage after cleanup
  ansible.builtin.command: df -h /
  register: df_result
  changed_when: false

- name: Show disk usage
  ansible.builtin.debug:
    msg: "{{ df_result.stdout_lines }}"

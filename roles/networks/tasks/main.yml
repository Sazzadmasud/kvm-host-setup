---
# ──────────────────────────────────────────────
#  Helper macro — define + autostart + start a
#  libvirt network from a rendered XML file
# ──────────────────────────────────────────────

# ──────────────────────────────────────────────
#  Define the OCP lab network
# ──────────────────────────────────────────────
- name: Render labnet XML
  ansible.builtin.template:
    src: labnet.xml.j2
    dest: /tmp/labnet.xml
    mode: "0644"

- name: Check if labnet is already defined
  ansible.builtin.command: "virsh -c qemu:///system net-info {{ ocp_network_name }}"
  register: net_info
  changed_when: false
  ignore_errors: true

- name: Define labnet
  ansible.builtin.command: "virsh -c qemu:///system net-define /tmp/labnet.xml"
  when: net_info.rc != 0
  changed_when: true

- name: Autostart labnet
  ansible.builtin.command: "virsh -c qemu:///system net-autostart {{ ocp_network_name }}"
  changed_when: true

- name: Start labnet
  ansible.builtin.command: "virsh -c qemu:///system net-start {{ ocp_network_name }}"
  register: net_start
  changed_when: net_start.rc == 0
  failed_when: net_start.rc != 0 and 'already active' not in net_start.stderr

# ──────────────────────────────────────────────
#  Host DNS: teach NetworkManager to resolve
#  *.cluster.base_domain via libvirt dnsmasq
# ──────────────────────────────────────────────
- name: Configure NetworkManager to forward OCP domain to libvirt dnsmasq
  ansible.builtin.copy:
    dest: "/etc/NetworkManager/conf.d/ocp-{{ cluster_name }}.conf"
    content: |
      [main]
      dns=dnsmasq
    mode: "0644"

- name: Write dnsmasq stub zone for OCP cluster
  ansible.builtin.copy:
    dest: "/etc/NetworkManager/dnsmasq.d/ocp-{{ cluster_name }}.conf"
    content: |
      server=/{{ cluster_name }}.{{ base_domain }}/{{ ocp_network_gateway }}
      address=/apps.{{ cluster_name }}.{{ base_domain }}/{{ ingress_vip }}
    mode: "0644"

- name: Reload NetworkManager to apply DNS config
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded

# ──────────────────────────────────────────────
#  /etc/hosts fallback entries
# ──────────────────────────────────────────────
- name: Add API VIP to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "api\\.{{ cluster_name }}\\.{{ base_domain }}"
    line: "{{ api_vip }} api.{{ cluster_name }}.{{ base_domain }}"

- name: Add Ingress VIP to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "apps\\.{{ cluster_name }}\\.{{ base_domain }}"
    line: "{{ ingress_vip }} oauth-openshift.apps.{{ cluster_name }}.{{ base_domain }} console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"

- name: Add cluster node entries to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "{{ item.name }}\\.{{ cluster_name }}\\.{{ base_domain }}"
    line: "{{ item.ip }} {{ item.name }}.{{ cluster_name }}.{{ base_domain }}"
  loop: "{{ control_nodes + worker_nodes }}"

# ──────────────────────────────────────────────
#  RHOSO networks
# ──────────────────────────────────────────────
- name: Render osp-internalapi XML
  ansible.builtin.template:
    src: osp-internalapi.xml.j2
    dest: /tmp/osp-internalapi.xml
    mode: "0644"

- name: Check if osp-internalapi is already defined
  ansible.builtin.command: "virsh -c qemu:///system net-info {{ osp_internalapi_network_name }}"
  register: internalapi_net_info
  changed_when: false
  ignore_errors: true

- name: Define osp-internalapi
  ansible.builtin.command: "virsh -c qemu:///system net-define /tmp/osp-internalapi.xml"
  when: internalapi_net_info.rc != 0
  changed_when: true

- name: Autostart osp-internalapi
  ansible.builtin.command: "virsh -c qemu:///system net-autostart {{ osp_internalapi_network_name }}"
  changed_when: true

- name: Start osp-internalapi
  ansible.builtin.command: "virsh -c qemu:///system net-start {{ osp_internalapi_network_name }}"
  register: internalapi_start
  changed_when: internalapi_start.rc == 0
  failed_when: internalapi_start.rc != 0 and 'already active' not in internalapi_start.stderr

- name: Render osp-provider XML
  ansible.builtin.template:
    src: osp-provider.xml.j2
    dest: /tmp/osp-provider.xml
    mode: "0644"

- name: Check if osp-provider is already defined
  ansible.builtin.command: "virsh -c qemu:///system net-info {{ osp_provider_network_name }}"
  register: provider_net_info
  changed_when: false
  ignore_errors: true

- name: Define osp-provider
  ansible.builtin.command: "virsh -c qemu:///system net-define /tmp/osp-provider.xml"
  when: provider_net_info.rc != 0
  changed_when: true

- name: Autostart osp-provider
  ansible.builtin.command: "virsh -c qemu:///system net-autostart {{ osp_provider_network_name }}"
  changed_when: true

- name: Start osp-provider
  ansible.builtin.command: "virsh -c qemu:///system net-start {{ osp_provider_network_name }}"
  register: provider_start
  changed_when: provider_start.rc == 0
  failed_when: provider_start.rc != 0 and 'already active' not in provider_start.stderr

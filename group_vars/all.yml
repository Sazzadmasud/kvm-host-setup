---
# ──────────────────────────────────────────────
#  OCP Cluster
# ──────────────────────────────────────────────
cluster_name: ocp
base_domain: lab.local
ocp_version: "4.18"

# ──────────────────────────────────────────────
#  Networking
# ──────────────────────────────────────────────
ocp_network_name: labnet
ocp_network_bridge: virbr4
ocp_network_gateway: 192.168.200.1
ocp_network_cidr: 192.168.200.0/24
ocp_network_netmask: 255.255.255.0
ocp_network_dhcp_start: 192.168.200.100
ocp_network_dhcp_end: 192.168.200.200

# VIPs must be outside the DHCP range
api_vip: 192.168.200.10
ingress_vip: 192.168.200.11

# ──────────────────────────────────────────────
#  Storage
# ──────────────────────────────────────────────
libvirt_storage_pool_name: ocp-images
libvirt_storage_pool_path: /opt/images

ocp_base_dir: /opt/ocp
ocp_install_dir: "{{ ocp_base_dir }}/cluster"

# ──────────────────────────────────────────────
#  VM Defaults
# ──────────────────────────────────────────────
# Host: i7-10710U, 12 threads, 62GB RAM
# Control total: 3 × 14 GB = 42 GB
# Worker total:  2 × 12 GB = 24 GB  (extra headroom for RHOSO workloads)
# Host reserve:  ~2-3 GB

control_vm_vcpus: 4
control_vm_ram_mb: 14336
control_vm_disk_gb: 120

worker_vm_vcpus: 4
worker_vm_ram_mb: 12288
worker_vm_disk_gb: 120

# ──────────────────────────────────────────────
#  Nodes  (static IPs + MAC addresses)
# ──────────────────────────────────────────────
control_nodes:
  - name: ocp-control-1
    mac: "52:54:00:c0:01:01"
    ip: 192.168.200.21
    role: master
    mac_internalapi: "52:54:00:c0:03:01"
    mac_provider: "52:54:00:c0:04:01"
  - name: ocp-control-2
    mac: "52:54:00:c0:01:02"
    ip: 192.168.200.22
    role: master
    mac_internalapi: "52:54:00:c0:03:02"
    mac_provider: "52:54:00:c0:04:02"
  - name: ocp-control-3
    mac: "52:54:00:c0:01:03"
    ip: 192.168.200.23
    role: master
    mac_internalapi: "52:54:00:c0:03:03"
    mac_provider: "52:54:00:c0:04:03"

worker_nodes:
  - name: ocp-worker-1
    mac: "52:54:00:c0:02:01"
    ip: 192.168.200.31
    role: worker
    mac_internalapi: "52:54:00:c0:03:04"
    mac_provider: "52:54:00:c0:04:04"
  - name: ocp-worker-2
    mac: "52:54:00:c0:02:02"
    ip: 192.168.200.32
    role: worker
    mac_internalapi: "52:54:00:c0:03:05"
    mac_provider: "52:54:00:c0:04:05"

# ──────────────────────────────────────────────
#  Directories to wipe during full cleanup
# ──────────────────────────────────────────────
cleanup_dirs:
  - /opt/images
  - /opt/ocp/cluster   # install state only — pull-secret.json at /opt/ocp/ is preserved
  - /opt/ocp-build
  - /opt/ocp-lab

# libvirt user (will be added to libvirt group)
libvirt_user: "{{ ansible_user_id }}"

# ──────────────────────────────────────────────
#  Sushy — Redfish emulator for libvirt VMs
# ──────────────────────────────────────────────
sushy_port: 8000
# Accessible from VMs via the bridge gateway
sushy_host: "{{ ocp_network_gateway }}"

# ──────────────────────────────────────────────
#  RHOSO — extra VM networks
# ──────────────────────────────────────────────
osp_internalapi_network_name: osp-internalapi
osp_internalapi_bridge: virbr5
# Isolated L2 only — nodes configure IPs via NNCP (NMState/NodeNetworkConfigurationPolicy)

osp_provider_network_name: osp-provider
osp_provider_bridge: virbr6
osp_provider_gateway: 10.0.100.1
osp_provider_cidr: 10.0.100.0/24
osp_provider_netmask: 255.255.255.0
# NAT'd — floating IP range: 10.0.100.100–200 (configured in RHOSO later)

# ──────────────────────────────────────────────
#  WireGuard VPN
# ──────────────────────────────────────────────
wireguard_port: 51820
wireguard_server_ip: 10.10.0.1      # KVM host WG address
wireguard_client_ip: 10.10.0.2      # Mac client WG address
wireguard_subnet: 10.10.0.0/24

# Set to your router's public IP if connecting from outside the LAN.
# For LAN-only access, the host's local IP (192.168.1.154) is fine.
# For internet access: set your router's public IP and forward UDP 51820 → 192.168.1.154.
wireguard_server_endpoint: "97.237.125.73"

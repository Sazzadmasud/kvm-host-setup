---
# Full wipe playbook — destroys all VMs, networks, pools, and cleans directories.
# Run this before a fresh OCP install.
#
# Usage:
#   ansible-playbook cleanup.yml
#   ansible-playbook cleanup.yml -e "skip_dir_cleanup=true"  # keep /opt dirs

- name: Full KVM host cleanup
  hosts: kvm_hosts
  gather_facts: true

  vars:
    skip_dir_cleanup: false

  pre_tasks:
    - name: Warn user
      ansible.builtin.pause:
        prompt: |
          ⚠️  This will DESTROY all VMs, networks, storage pools,
          and wipe {{ cleanup_dirs | join(', ') }}.
          Press ENTER to continue or Ctrl-C to abort.

  roles:
    - role: cleanup

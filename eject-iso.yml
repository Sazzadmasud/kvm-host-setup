---
# Waits for bootstrap-complete and install-complete after VMs are started.
# ISO ejection is handled automatically by the assisted-service via Redfish
# (sushy-emulator) — no manual eject step needed.
#
# Run this after: ansible-playbook site.yml --tags vms
#   (or use deploy.yml which chains all steps automatically)
#
# Usage:
#   ansible-playbook eject-iso.yml

- name: Wait for OCP bootstrap-complete and install-complete
  hosts: kvm_hosts
  gather_facts: true

  vars:
    bootstrap_timeout_minutes: 90  # max wait for bootstrap-complete
    install_timeout_minutes: 60    # max wait for install-complete (cluster operators)

  tasks:
    - name: Start openshift-install agent wait-for bootstrap-complete (background)
      ansible.builtin.command: >
        /usr/local/bin/openshift-install agent wait-for bootstrap-complete
        --dir {{ ocp_install_dir }} --log-level=info
      async: "{{ bootstrap_timeout_minutes * 60 }}"
      poll: 0
      register: bootstrap_job

    - name: Wait for bootstrap-complete
      ansible.builtin.async_status:
        jid: "{{ bootstrap_job.ansible_job_id }}"
      register: bs_result
      until: bs_result.finished
      retries: "{{ bootstrap_timeout_minutes * 2 }}"
      delay: 30

    - name: Bootstrap-complete outcome
      ansible.builtin.debug:
        msg: >-
          Bootstrap {{ 'completed successfully' if (bs_result.rc | default(1)) == 0
                       else 'FAILED (rc=' + ((bs_result.rc | default('?')) | string) + ')' }}

    - name: Fail play if bootstrap did not complete
      ansible.builtin.fail:
        msg: "Bootstrap-complete returned rc={{ bs_result.rc }}"
      when: (bs_result.rc | default(1)) != 0

    # ──────────────────────────────────────────────
    #  Phase 2 — wait for install-complete
    # ──────────────────────────────────────────────
    - name: Start wait-for install-complete (background)
      ansible.builtin.command: >
        /usr/local/bin/openshift-install agent wait-for install-complete
        --dir {{ ocp_install_dir }} --log-level=info
      async: "{{ install_timeout_minutes * 60 }}"
      poll: 0
      register: install_job

    - name: Wait for install-complete
      ansible.builtin.async_status:
        jid: "{{ install_job.ansible_job_id }}"
      register: ic_result
      until: ic_result.finished
      retries: "{{ install_timeout_minutes * 2 }}"
      delay: 30

    - name: Install-complete outcome
      ansible.builtin.debug:
        msg: >-
          Install {{ 'completed successfully' if (ic_result.rc | default(1)) == 0
                     else 'FAILED (rc=' + ((ic_result.rc | default('?')) | string) + ')' }}

    - name: Fail play if install did not complete
      ansible.builtin.fail:
        msg: "Install-complete returned rc={{ ic_result.rc }}"
      when: (ic_result.rc | default(1)) != 0

    # ──────────────────────────────────────────────
    #  Post-install fixups
    # ──────────────────────────────────────────────
    - name: Fix ownership of OCP install directory
      ansible.builtin.file:
        path: "{{ ocp_base_dir }}"
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
        recurse: true
      become: true

    - name: Export KUBECONFIG in ~/.bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        regexp: '^export KUBECONFIG='
        line: "export KUBECONFIG={{ ocp_install_dir }}/auth/kubeconfig"
        state: present
      become: false

    - name: Installation complete
      ansible.builtin.debug:
        msg:
          - "OCP {{ ocp_version }} install complete."
          - "API:     https://api.{{ cluster_name }}.{{ base_domain }}:6443"
          - "Console: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"
          - "kubeadmin password: cat {{ ocp_install_dir }}/auth/kubeadmin-password"
          - "KUBECONFIG added to ~/.bashrc — run: source ~/.bashrc"

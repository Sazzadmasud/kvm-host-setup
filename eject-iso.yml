---
# Monitors RHCOS image-write progress, ejects the agent ISO from each VM as
# soon as its disk write completes, then waits for bootstrap-complete.
#
# Run this after: ansible-playbook site.yml --tags vms
# Then run:       openshift-install agent wait-for install-complete \
#                   --dir /opt/ocp/cluster --log-level=info
#
# Why eject early?
#   UEFI NVRAM on KVM does not reliably honour the XML boot-order override;
#   leaving the ISO attached causes nodes to reboot back into the installer
#   after the disk write, stalling the install.
#
# Detection (first signal wins per node):
#   1. virsh state → shut-off   (VM just rebooted after writing RHCOS to disk)
#   2. install log → "Writing image.*100" or "Rebooting" for the node's name
#
# Usage:
#   ansible-playbook eject-iso.yml

- name: Eject agent ISO after RHCOS image write, then reach bootstrap-complete
  hosts: kvm_hosts
  gather_facts: false

  vars:
    eject_timeout_minutes: 45     # max wait for image writes across all nodes
    bootstrap_timeout_minutes: 90 # max wait for bootstrap-complete

  tasks:
    - name: Build full VM list
      ansible.builtin.set_fact:
        all_vm_names: "{{ (control_nodes + worker_nodes) | map(attribute='name') | list }}"

    - name: Render eject-monitor script
      ansible.builtin.template:
        src: roles/vms/templates/eject-monitor.sh.j2
        dest: /tmp/ocp_eject_monitor.sh
        mode: "0755"

    - name: Start openshift-install agent wait-for bootstrap-complete (background)
      ansible.builtin.command: >
        /usr/local/bin/openshift-install agent wait-for bootstrap-complete
        --dir {{ ocp_install_dir }} --log-level=info
      async: "{{ bootstrap_timeout_minutes * 60 }}"
      poll: 0
      register: bootstrap_job

    - name: Watch for image-write completion and eject ISO from each node
      ansible.builtin.command: /bin/bash /tmp/ocp_eject_monitor.sh
      register: eject_result
      changed_when: "'ISO ejected' in eject_result.stdout"
      failed_when: eject_result.rc != 0
      timeout: "{{ eject_timeout_minutes * 60 + 60 }}"

    - name: Show eject log
      ansible.builtin.debug:
        msg: "{{ eject_result.stdout_lines }}"

    - name: Clean up monitor script
      ansible.builtin.file:
        path: /tmp/ocp_eject_monitor.sh
        state: absent

    - name: Wait for bootstrap-complete
      ansible.builtin.async_status:
        jid: "{{ bootstrap_job.ansible_job_id }}"
      register: bs_result
      until: bs_result.finished
      retries: "{{ bootstrap_timeout_minutes * 2 }}"
      delay: 30

    - name: Bootstrap-complete outcome
      ansible.builtin.debug:
        msg: >-
          Bootstrap {{ 'completed successfully' if (bs_result.rc | default(1)) == 0
                       else 'FAILED (rc=' + ((bs_result.rc | default('?')) | string) + ')' }}

    - name: Fail play if bootstrap did not complete
      ansible.builtin.fail:
        msg: "Bootstrap-complete returned rc={{ bs_result.rc }}"
      when: (bs_result.rc | default(1)) != 0
